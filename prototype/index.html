<title>Revenue Recovery — Ops Console (V0)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ============ tokens ============ */

    --ink:#1a2330; --ink2:#57616e; --ink3:#8a939e;
    --accent:#2557d6; --accent-ink:#ffffff; --accent-soft:#e8eefb; --accent-line:#b7c8ef;
    --good:#1a7f4b; --good-soft:#e3f2ea; --warn:#a85408; --warn-soft:#fbeede; --crit:#c03028; --crit-soft:#fae7e5;
    --sidebar:#151b23; --sidebar-line:#242d38; --sidebar-ink:#96a1ad; --sidebar-hi:#f2f5f8;
    --bar:#7f9ce3; --bar-hi:#2557d6;
    --shadow:0 1px 2px rgba(20,28,40,.06);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1319; --surface:#151b23; --surface2:#1a212b; --border:#242d38; --border-strong:#33404e;
      --ink:#e7ebf0; --ink2:#9aa5b1; --ink3:#68737f;
      --accent:#7c9ff2; --accent-ink:#0e1319; --accent-soft:#1c2740; --accent-line:#33487c;
      --good:#4cba82; --good-soft:#14291e; --warn:#e09452; --warn-soft:#2e2113; --crit:#e2726b; --crit-soft:#331715;
      --bar:#3d5a9e; --bar-hi:#7c9ff2;
      --shadow:none;
    }
  }
  :root[data-theme="dark"]{
    --bg:#0e1319; --surface:#151b23; --surface2:#1a212b; --border:#242d38; --border-strong:#33404e;
    --ink:#e7ebf0; --ink2:#9aa5b1; --ink3:#68737f;
    --accent:#7c9ff2; --accent-ink:#0e1319; --accent-soft:#1c2740; --accent-line:#33487c;
    --good:#4cba82; --good-soft:#14291e; --warn:#e09452; --warn-soft:#2e2113; --crit:#e2726b; --crit-soft:#331715;
    --bar:#3d5a9e; --bar-hi:#7c9ff2;
    --shadow:none;
  }
  :root[data-theme="light"]{
    --bg:#f4f5f7; --surface:#ffffff; --surface2:#eef0f3; --border:#e2e5e9; --border-strong:#c7cdd4;
    --ink:#1a2330; --ink2:#57616e; --ink3:#8a939e;
    --accent:#2557d6; --accent-ink:#ffffff; --accent-soft:#e8eefb; --accent-line:#b7c8ef;
    --good:#1a7f4b; --good-soft:#e3f2ea; --warn:#a85408; --warn-soft:#fbeede; --crit:#c03028; --crit-soft:#fae7e5;
    --bar:#7f9ce3; --bar-hi:#2557d6;
    --shadow:0 1px 2px rgba(20,28,40,.06);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  button{font:inherit;cursor:pointer}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:3px}
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation:none!important;transition:none!important} }

  /* ============ shell ============ */
  .app{display:flex;min-height:100vh}
  .rail{width:216px;flex:none;background:var(--sidebar);color:var(--sidebar-ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .rail .brand{padding:18px 18px 14px;border-bottom:1px solid var(--sidebar-line)}
  .brand .word{color:var(--sidebar-hi);font-weight:650;font-size:14px;letter-spacing:.01em}
  .brand .word span{color:#5f86e8}
  .brand .co{font:11px/1.4 var(--mono);color:var(--sidebar-ink);margin-top:3px}
  .rail nav{padding:10px 8px;display:flex;flex-direction:column;gap:2px}
  .rail .sect{font:10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#5c6772;padding:14px 10px 6px}
  .rail a.nv{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;color:var(--sidebar-ink);font-size:13.5px}
  .rail a.nv:hover{background:#1d2530;color:var(--sidebar-hi);text-decoration:none}
  .rail a.nv.on{background:#232d3a;color:var(--sidebar-hi)}
  .rail a.nv .ic{width:16px;text-align:center;flex:none;opacity:.85}
  .rail a.nv .n{margin-left:auto;font:11px/1 var(--mono);background:#2c3745;color:#c8d2dd;padding:3px 6px;border-radius:9px}
  .rail .foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--sidebar-line);font:10.5px/1.6 var(--mono);color:#5c6772}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:14px;padding:12px 26px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5}
  .top .biz{font-weight:600;font-size:13.5px}
  .top .biz small{display:block;font:10.5px/1.3 var(--mono);color:var(--ink3);font-weight:400}
  .top .sp{flex:1}
  .content{padding:22px 26px 60px;max-width:1180px;width:100%;margin:0 auto}

  /* ============ primitives ============ */
  .h1{font-size:19px;font-weight:650;letter-spacing:-.01em;margin:0}
  .sub{color:var(--ink2);font-size:13px;margin:4px 0 0}
  .pghead{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .pghead .sp{flex:1}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow)}
  .card .chead{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border)}
  .card .chead h3{margin:0;font-size:13px;font-weight:600}
  .card .chead .sp{flex:1}
  .card .cbody{padding:14px 16px}
  .lbl{font:10px/1 var(--mono);letter-spacing:.11em;text-transform:uppercase;color:var(--ink3)}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr} .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:960px){.g2,.g3{grid-template-columns:1fr}}

  .chip{display:inline-flex;align-items:center;gap:5px;font:11px/1 var(--mono);padding:4px 8px;border-radius:999px;border:1px solid var(--border);color:var(--ink2);background:var(--surface2);white-space:nowrap}
  .chip.good{background:var(--good-soft);color:var(--good);border-color:transparent}
  .chip.warn{background:var(--warn-soft);color:var(--warn);border-color:transparent}
  .chip.crit{background:var(--crit-soft);color:var(--crit);border-color:transparent}
  .chip.acc{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);font-size:12.5px;font-weight:550}
  .btn:hover{background:var(--surface2)}
  .btn.pri{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .btn.pri:hover{filter:brightness(1.06)}
  .btn.sm{padding:4px 9px;font-size:11.5px}
  .btn:disabled{opacity:.5;cursor:default}

  table.t{width:100%;border-collapse:collapse;font-size:13px}
  table.t th{text-align:left;font:10px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
  table.t td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  table.t tr:last-child td{border-bottom:0}
  table.t tr.rowlink{cursor:pointer}
  table.t tr.rowlink:hover td{background:var(--surface2)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .tscroll{overflow-x:auto}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
  @media(max-width:960px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 16px;box-shadow:var(--shadow)}
  .kpi .v{font:600 22px/1.2 var(--mono);font-variant-numeric:tabular-nums;margin-top:7px;letter-spacing:-.01em}
  .kpi .d{font-size:11.5px;color:var(--ink2);margin-top:4px}
  .kpi .d b{font-weight:600}
  .kpi.risk .v{color:var(--warn)} .kpi.won .v{color:var(--good)}

  .toast{position:fixed;right:18px;bottom:18px;z-index:50;display:flex;flex-direction:column;gap:8px}
  .toast .tst{background:var(--sidebar);color:#e8edf3;font-size:12.5px;padding:10px 14px;border-radius:7px;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:340px}
  .toast .tst b{color:#fff}

  /* attention queue */
  .att{display:flex;flex-direction:column}
  .att .it{display:flex;gap:12px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer}
  .att .it:last-child{border-bottom:0}
  .att .it:hover{background:var(--surface2)}
  .att .stripe{width:3px;align-self:stretch;border-radius:2px;flex:none}
  .att .stripe.crit{background:var(--crit)} .att .stripe.warn{background:var(--warn)} .att .stripe.acc{background:var(--accent)}
  .att .who{min-width:0;flex:1}
  .att .who .nm{font-weight:600;font-size:13px}
  .att .who .why{color:var(--ink2);font-size:12px;margin-top:1px}
  .att .act{flex:none}

  /* urgency meter */
  .urg{display:inline-flex;align-items:center;gap:7px}
  .urg .cells{display:inline-flex;gap:2px}
  .urg .c{width:5px;height:12px;border-radius:1.5px;background:var(--surface2);border:1px solid var(--border)}
  .urg .c.f{border-color:transparent}
  .urg.hi .c.f{background:var(--crit)} .urg.md .c.f{background:var(--warn)} .urg.lo .c.f{background:var(--ink3)}
  .urg .sc{font:11px/1 var(--mono);color:var(--ink2)}

  /* conversation / phone */
  .thread{display:flex;flex-direction:column;gap:10px}
  .ev{display:flex;gap:10px;align-items:flex-start}
  .ev .tk{font:10.5px/1.7 var(--mono);color:var(--ink3);width:74px;flex:none;text-align:right;padding-top:4px}
  .ev .body{flex:1;min-width:0}
  .bubble{display:inline-block;max-width:78%;padding:8px 12px;border-radius:10px;font-size:13px}
  .bubble.cust{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
  .bubble.us{background:var(--accent-soft);border:1px solid var(--accent-line);border-bottom-right-radius:3px}
  .ev.right .body{display:flex;flex-direction:column;align-items:flex-end}
  .sys{font:11.5px/1.5 var(--mono);color:var(--ink2);background:var(--surface2);border:1px dashed var(--border-strong);padding:6px 10px;border-radius:6px;display:inline-block}
  .sys b{color:var(--ink)}
  .bfrom{font:10px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:0 2px 3px}

  .phone{width:300px;flex:none;background:var(--surface);border:1px solid var(--border-strong);border-radius:18px;padding:12px 12px 16px;box-shadow:var(--shadow)}
  .phone .pstat{display:flex;justify-content:space-between;font:10.5px/1 var(--mono);color:var(--ink3);padding:2px 6px 10px;border-bottom:1px solid var(--border);margin-bottom:10px}
  .phone .msgs{display:flex;flex-direction:column;gap:8px;min-height:280px}
  .phone .bubble{max-width:88%}
  .phone .meta{font:9.5px/1 var(--mono);color:var(--ink3);margin:2px 4px}

  /* flow sim */
  .sim{display:flex;gap:18px;align-items:flex-start}
  .sim .log{flex:1;min-width:0}
  .simstep{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
  .simstep:last-child{border-bottom:0}
  .simstep .t{font:10.5px/1.8 var(--mono);color:var(--ink3);width:70px;flex:none;text-align:right}
  .simstep .tt{font-weight:600;font-size:13px}
  .simstep .dd{color:var(--ink2);font-size:12.5px;margin-top:1px}
  .simstep.pending{opacity:.32}
  @media(max-width:860px){.sim{flex-direction:column}.phone{width:100%}}

  /* sequence */
  .seq{display:flex;flex-direction:column}
  .seqstep{display:flex;gap:14px;position:relative;padding:0 0 22px 0}
  .seqstep .rail2{width:26px;flex:none;display:flex;flex-direction:column;align-items:center}
  .seqstep .nd{width:12px;height:12px;border-radius:50%;border:2px solid var(--border-strong);background:var(--surface);z-index:1;flex:none;margin-top:3px}
  .seqstep .ln{flex:1;width:2px;background:var(--border)}
  .seqstep:last-child .ln{display:none}
  .seqstep.done .nd{background:var(--good);border-color:var(--good)}
  .seqstep.now .nd{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .seqstep .sb{flex:1;min-width:0;margin-top:-2px}
  .seqstep .when{font:10.5px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
  .seqstep .what{font-weight:600;font-size:13px;margin:3px 0 2px}
  .seqstep .msg{font-size:12.5px;color:var(--ink2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;margin-top:5px;max-width:560px}

  /* probability bar */
  .prob{display:inline-flex;align-items:center;gap:8px;min-width:110px}
  .prob .tr{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;min-width:56px}
  .prob .fl{display:block;height:100%;border-radius:3px;background:var(--bar-hi)}
  .prob.lo .fl{background:var(--warn)}
  .prob .pv{font:11px/1 var(--mono);color:var(--ink2);width:32px;text-align:right}

  /* charts */
  .chart{padding:6px 2px}
  .cbars{display:flex;align-items:flex-end;gap:14px;height:150px;padding:0 4px;border-bottom:1px solid var(--border)}
  .cb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative}
  .cb .bar{width:26px;max-width:60%;background:var(--bar);border-radius:4px 4px 0 0;position:relative}
  .cb.hi .bar{background:var(--bar-hi)}
  .cb .bv{font:10.5px/1 var(--mono);color:var(--ink2);margin-bottom:5px}
  .cxl{display:flex;gap:14px;padding:6px 4px 0}
  .cxl span{flex:1;text-align:center;font:10.5px/1 var(--mono);color:var(--ink3)}
  .hbars{display:flex;flex-direction:column;gap:9px}
  .hb{display:grid;grid-template-columns:110px 1fr 34px;gap:10px;align-items:center}
  .hb .hl{font-size:12.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hb .tr{height:14px;background:var(--surface2);border-radius:0 4px 4px 0;overflow:hidden}
  .hb .fl{display:block;height:100%;background:var(--bar);border-radius:0 4px 4px 0}
  .hb:first-child .fl{background:var(--bar-hi)}
  .hb .hv{font:11px/1 var(--mono);color:var(--ink2);text-align:right}
  [data-tip]{position:relative}
  [data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--sidebar);color:#e8edf3;font:11px/1.4 var(--mono);padding:5px 8px;border-radius:5px;white-space:nowrap;z-index:20}
  details.dtable{margin-top:10px}
  details.dtable summary{font:11px/1 var(--mono);color:var(--ink2);cursor:pointer}
  details.dtable table{margin-top:8px}

  /* settings */
  .set .row{display:grid;grid-template-columns:220px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
  .set .row:last-child{border-bottom:0}
  .set .rl b{font-size:13px;font-weight:600;display:block}
  .set .rl span{font-size:12px;color:var(--ink2)}
  @media(max-width:860px){.set .row{grid-template-columns:1fr}}
  .hoursrow{display:flex;gap:10px;align-items:center;padding:4px 0;font-size:13px}
  .hoursrow .dy{width:44px;font-family:var(--mono);font-size:11.5px;color:var(--ink2)}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .field input[type=text],.field textarea,.field select{font:13px var(--sans);color:var(--ink);background:var(--surface);border:1px solid var(--border-strong);border-radius:6px;padding:7px 10px;width:100%;max-width:520px}
  .field textarea{font-family:var(--mono);font-size:12px;line-height:1.55;resize:vertical}
  .radio{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:8px;max-width:560px;cursor:pointer}
  .radio.on{border-color:var(--accent);background:var(--accent-soft)}
  .radio b{font-size:13px;display:block}
  .radio span{font-size:12px;color:var(--ink2)}
  .ckrow{display:flex;gap:8px;align-items:center;padding:4px 0;font-size:13px}

  .backlink{font:11.5px/1 var(--mono);color:var(--ink2);display:inline-block;margin-bottom:12px}
  .empty{padding:22px 16px;text-align:center;color:var(--ink3);font-size:12.5px}
  .banner{display:flex;gap:10px;align-items:center;border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:16px}
  .banner .mono{color:var(--ink2)}
</style>

const urgCls = u => u>=8?'hi':u>=5?'md':'lo';
function urgMeter(u){
  let c=''; for(let i=1;i<=10;i++) c+=`<span class="c ${i<=u?'f':''}"></span>`;
  const word = u>=8?'Emergency':u>=5?'Priority':'Standard';
  return `<span class="urg ${urgCls(u)}" title="Urgency ${u}/10 — ${word}"><span class="cells">${c}</span><span class="sc">${u}/10</span></span>`;
}
function statusChip(s){
  const k = /Booked|Completed|complete/i.test(s)?'good' : /UNCONF|No reply|needs/i.test(s)?'warn' : /requested/i.test(s)?'acc':'';
  return `<span class="chip ${k}">${s}</span>`;
}
function probBar(p){ return `<span class="prob ${p<40?'lo':''}"><span class="tr"><span class="fl" style="width:${p}%"></span></span><span class="pv">${p}%</span></span>`; }

function vFlow(n){
  const F = n===1?FLOW1:FLOW2;

  const title = n===1?'Flow 1 — After-hours call, recovered':'Flow 2 — Website form, answered in 60 seconds';
  const sub = n===1?'Thursday 9:42 PM. The office is closed. Walk through exactly what the customer and the system each see.':'A form fill during a busy morning. The 60-second promise, step by step.';
  const shown = F.slice(0, step);
  return `
  <div class="pghead"><div><h1 class="h1">${title}</h1><p class="sub">${sub}</p></div>
    <div class="sp"></div>
    <span class="mono" style="font-size:11px;color:var(--ink2);align-self:center">step ${step} / ${F.length}</span>
    <button class="btn" onclick="flowReset(${n})">Reset</button>
    <button class="btn pri" id="advBtn" onclick="flowNext(${n})" ${step>=F.length?'disabled':''}>${step===0?'Start':step>=F.length?'Done':'Next step →'}</button>
  </div>
  <div class="sim">
    <div class="phone">
      <div class="pstat"><span>Customer’s phone</span><span>${n===1?'9:42 PM':'11:03 AM'}</span></div>

      </div>
      <div style="font:9.5px/1.4 var(--mono);color:var(--ink3);text-align:center;margin-top:10px;border-top:1px solid var(--border);padding-top:8px">gray = Reyes Plumbing · blue = customer</div>
    </div>
    <div class="log card"><div class="chead"><h3>What the system is doing</h3><div class="sp"></div><span class="lbl">business side</span></div>
      <div class="cbody">
        ${F.map((s,i)=>`
          <div class="simstep ${i<step?'':'pending'}">
            <span class="t">${s.t}</span>
            <div>${s.sys?`<div class="tt">${s.sys.tt}</div><div class="dd">${s.sys.dd}</div>`:`<div class="dd" style="font-style:italic">customer replies…</div>`}</div>
          </div>`).join('')}
        ${step>=F.length?`<div style="margin-top:12px;display:flex;gap:8px">
          <a class="btn pri" href="${n===1?'#/lead/L-1041':'#/lead/L-1042'}">Open this lead in the dashboard →</a>
        </div>`:''}

    </div>
  </div>`;
}

/* =================== actions =================== */
function sendReminder(qid){
  S.reminded[qid]=true;
  const q = QUOTES.find(x=>x.id===qid);
  toast(`<b>Reminder sent</b> — ${q.name}, ${q.id} (${fmt$(q.amount)}). Reply lands in the lead thread.`);
  route();
}
function confirmAppt(lid){
  S.confirmed[lid]=true;
  toast('<b>Confirmed & dispatched.</b> Dana gets: “You’re confirmed for 8–10 AM — Miguel will text when he’s 30 min out.”');
  route();
}
function flowNext(n){ if(n===1){S.flow1=Math.min(S.flow1+1,FLOW1.length)} else {S.flow2=Math.min(S.flow2+1,FLOW2.length)} route(); }
function flowReset(n){ if(n===1){S.flow1=0}else{S.flow2=0} route(); }

/* =================== router =================== */
function route(){
  const h = location.hash || '#/dashboard';
  const v = document.getElementById('view');
  let html;
  if(h.startsWith('#/lead/')) html = vLead(h.split('/')[2]);
  else if(h.startsWith('#/leads')) html = vLeads();
  else if(h.startsWith('#/quotes')) html = vQuotes();
  else if(h.startsWith('#/followups')) html = vFollowups();
  else if(h.startsWith('#/reporting')) html = vReporting();
  else if(h.startsWith('#/settings')) html = vSettings();
  else if(h.startsWith('#/flow1')) html = vFlow(1);
  else if(h.startsWith('#/flow2')) html = vFlow(2);
  else html = vDashboard();
  v.innerHTML = html;
  renderNav();
  v.scrollTop = 0; window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);
document.getElementById('themeBtn').addEventListener('click', ()=>{
  const r = document.documentElement;
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  const cur = r.getAttribute('data-theme') || (dark?'dark':'light');
  r.setAttribute('data-theme', cur==='dark'?'light':'dark');
});
route();
